name: CI

# Three jobs, in dependency order:
#   check-flake     — runs on every push and PR; lints and evaluates the module.
#   watch-openlinkhub — runs on schedule/manual; detects upstream version bumps.
#   update-flake-lock — runs manually, or automatically when a version bump is found.

on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *' # daily at 06:00 UTC — check whether openlinkhub has a new release

jobs:
  # ---------- CHECK ----------
  # A single `nix flake check` covers statix + deadnix + nixfmt + module-eval.
  check-flake:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true
      - uses: cachix/cachix-action@v15
        with:
          name: nix-community
      - name: Check flake.lock health
        uses: DeterminateSystems/flake-checker-action@v12
      - name: flake check
        run: nix flake check

  # ---------- WATCH ----------
  # Compares the openlinkhub version locked in flake.lock against the current
  # nixos-unstable HEAD. The lock update is only triggered when the version
  # actually changed, avoiding unrelated nixpkgs bumps in the PR history.
  watch-openlinkhub:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.compare.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve locked nixpkgs revision
        id: locked
        run: |
          rev=$(jq -r '.nodes.nixpkgs.locked.rev' flake.lock)
          echo "rev=$rev" >> "$GITHUB_OUTPUT"

      - name: Fetch openlinkhub version at locked revision
        id: old
        run: |
          version=$(curl -sL "https://raw.githubusercontent.com/NixOS/nixpkgs/${{ steps.locked.outputs.rev }}/pkgs/by-name/op/openlinkhub/package.nix" \
            | grep -oP 'version\s*=\s*"\K[^"]+')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Fetch openlinkhub version at nixos-unstable HEAD
        id: new
        run: |
          version=$(curl -sL "https://raw.githubusercontent.com/NixOS/nixpkgs/nixos-unstable/pkgs/by-name/op/openlinkhub/package.nix" \
            | grep -oP 'version\s*=\s*"\K[^"]+')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Compare versions
        id: compare
        run: |
          echo "locked  : ${{ steps.old.outputs.version }}"
          echo "unstable: ${{ steps.new.outputs.version }}"
          if [ "${{ steps.old.outputs.version }}" != "${{ steps.new.outputs.version }}" ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------- UPDATE ----------
  # Runs on manual dispatch, or automatically when watch-openlinkhub detects a bump.
  #
  # Requires the CI_BOT_TOKEN secret (Settings › Secrets › Actions): a classic or
  # fine-grained PAT with `contents: write` and `pull-requests: write` on this repo.
  # Using GITHUB_TOKEN instead would work, but PRs opened with it do not trigger
  # other workflows — a GitHub limitation.
  update-flake-lock:
    needs: watch-openlinkhub
    if: |
      (needs.watch-openlinkhub.result == 'success' || needs.watch-openlinkhub.result == 'skipped') &&
      (github.event_name == 'workflow_dispatch' ||
       (github.event_name == 'schedule' && needs.watch-openlinkhub.outputs.changed == 'true'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.CI_BOT_TOKEN }}

      - uses: cachix/install-nix-action@v27
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Update flake.lock
        uses: DeterminateSystems/update-flake-lock@v28
        with:
          token: ${{ secrets.CI_BOT_TOKEN }}
          pr-title: "chore: nix flake update"
          pr-labels: |
            dependencies
            automated
          branch: flake-lock-update
